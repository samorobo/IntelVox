name: Deploy Frontend (Optimized)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          REPO_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 1800s
          command_timeout: 1800s
          envs: GITHUB_TOKEN,GITHUB_SHA,REPO_NAME
          script: |
            set -e

            FRONTEND_DIR="/var/www/developmentsite.space/intelvox_frontend"

            echo "🚀 Cleaning old deployment..."
            rm -rf $FRONTEND_DIR

            echo "📥 Cloning latest code..."
            git clone https://x-access-token:$GITHUB_TOKEN@github.com/$REPO_NAME.git $FRONTEND_DIR
            cd $FRONTEND_DIR
            git checkout $GITHUB_SHA

            echo "⚡ Installing dependencies..."
            npm ci --prefer-offline --no-audit

            echo "📝 Writing environment..."
            echo "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" > .env.local

            echo "🏗️ Building Next.js app..."
            npm run build

            echo "♻ Restarting PM2..."
            pm2 stop intelvox_frontend 2>/dev/null || true
            pm2 delete intelvox_frontend 2>/dev/null || true
            pm2 start npm --name "intelvox_frontend" -- start
            pm2 save

            echo "🔍 Checking health..."
            sleep 3
            curl -I http://localhost:3000 || (pm2 logs intelvox_frontend --lines 50 && exit 1)

            echo "✅ Deployment successful!"
