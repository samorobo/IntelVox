name: Deploy Frontend (Optimized)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          REPO_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 1800s
          command_timeout: 1800s
          envs: GITHUB_TOKEN,GITHUB_SHA,REPO_NAME
          script: |
            set -e
            echo "🚀 Optimized frontend deployment started..."

            FRONTEND_DIR="/var/www/developmentsite.space/intelvox_frontend"

            echo "📁 Cleaning old deployment..."
            rm -rf $FRONTEND_DIR

            echo "📥 Cloning repository..."
            git clone https://x-access-token:$GITHUB_TOKEN@github.com/$REPO_NAME.git $FRONTEND_DIR
            cd $FRONTEND_DIR
            git checkout $GITHUB_SHA

            echo "⚡ Installing dependencies (cached if possible)..."
            npm install --prefer-offline --no-audit

            echo "🔧 Writing environment variables..."
            cat > .env.local <<EOF
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            EOF

            echo "🏗️ Building Next.js application..."
            npm run build

            echo "♻ Restarting PM2..."
            pm2 stop intelvox_frontend 2>/dev/null || true
            pm2 delete intelvox_frontend 2>/dev/null || true

            # Silent PM2 start to avoid SSH hang
            pm2 start npm --name "intelvox_frontend" \
              --cwd $FRONTEND_DIR -- start --silent >> /var/log/intelvox_frontend.log 2>&1

            pm2 save

            echo "🔍 Performing health check..."
            sleep 3

            for i in {1..10}; do
              if curl -sf http://localhost:3000 >/dev/null; then
                echo "✅ Deployment successful at $(date)"
                exit 0
              fi
              echo "Waiting for app to boot... ($i/10)"
              sleep 3
            done

            echo "❌ Health check failed"
            pm2 logs intelvox_frontend --lines 20
            exit 1
