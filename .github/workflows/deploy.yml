name: Deploy Frontend (Ultra-Optimized)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout repo
        uses: actions/checkout@v4

      - name: 🧰 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🧹 Clean previous build
        run: rm -rf .next

      - name: 🧱 Build Next.js (on GitHub, not on VPS!)
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          echo "NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}" > .env.local
          npm run build

      - name: 📦 Package deployment bundle
        run: |
          mkdir deploy_bundle
          cp -R .next package.json public next.config.js deploy_bundle/
          tar -czf deploy.tar.gz deploy_bundle

      - name: 📤 Upload build artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: deploy.tar.gz


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      - name: 🚀 Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "/tmp/deploy.tar.gz"
          timeout: 60s
          command_timeout: 60s

      - name: 🔧 Extract and start deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 600s
          command_timeout: 600s
          script: |
            set -e
            echo "🚀 Starting deployment..."

            FRONTEND_DIR="/var/www/developmentsite.space/intelvox_frontend"

            echo "📁 Creating deployment folder..."
            mkdir -p $FRONTEND_DIR

            echo "📦 Extracting build artifact..."
            tar -xzf /tmp/deploy.tar.gz -C $FRONTEND_DIR --strip-components=1

            echo "📝 Setting environment variables..."
            cat > $FRONTEND_DIR/.env.local <<EOF
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            EOF

            echo "♻️ Restarting PM2..."
            pm2 stop intelvox_frontend 2>/dev/null || true
            pm2 delete intelvox_frontend 2>/dev/null || true
            sleep 2

            cd $FRONTEND_DIR
            pm2 start npm --name intelvox_frontend -- start
            pm2 save

            echo "🔍 Health check..."
            sleep 5
            for i in {1..15}; do
              if curl -sf http://localhost:3000 >/dev/null; then
                echo "✅ Deployment successful at $(date)"
                exit 0
              fi
              echo "Waiting for server... ($i/15)"
              sleep 2
            done

            echo "❌ Health check failed"
            pm2 logs intelvox_frontend --lines 30
            exit 1
