name: Deploy Frontend (Direct Upload + Cleanup + Health Check)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # Step 1: Checkout the code
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # Step 2: Setup Node.js
      # ---------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate build
        run: |
          npm ci
          npm run build

      # ---------------------------
      # Step 3: Test SSH connection first
      # ---------------------------
      - name: Test SSH connection (stability check)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🔐 SSH connection test successful on $(hostname)"
            uptime

      # ---------------------------
      # Step 4: Upload clean code to VPS (with retry)
      # ---------------------------
      - name: Upload source code to VPS (attempt 1)
        id: upload1
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "."
          target: "/var/www/intelvox_frontend_temp"
          overwrite: true
          debug: true
          timeout: 180s
          command_timeout: 180s

      - name: Retry upload if first attempt failed
        if: steps.upload1.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "."
          target: "/var/www/intelvox_frontend_temp"
          overwrite: true
          debug: true
          timeout: 180s
          command_timeout: 180s

      # ---------------------------
      # Step 5: SSH into VPS and Deploy
      # ---------------------------
      - name: Deploy on VPS and verify
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🚀 Starting frontend deployment..."

            mkdir -p /var/www

            echo "🧹 Cleaning up previous deployment (keeping node_modules and logs)"
            if [ -d "/var/www/intelvox_frontend" ]; then
              rm -rf /var/www/intelvox_frontend_old
              mv /var/www/intelvox_frontend /var/www/intelvox_frontend_old
            fi

            echo "📦 Moving new build to /var/www/intelvox_frontend"
            mv /var/www/intelvox_frontend_temp /var/www/intelvox_frontend

            echo "🔹 Moving to project folder"
            cd /var/www/intelvox_frontend

            echo "🔹 Installing dependencies"
            npm ci

            echo "🔹 Building Next.js application"
            npm run build

            echo "🔹 Creating .env file"
            cat > .env.local <<EOF
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            EOF

            echo "🔹 Ensuring PM2 is installed"
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            echo "🔹 Stopping any existing processes on port 3000"
            sudo lsof -ti:3000 | xargs -r sudo kill -9 || echo "No processes found on port 3000"

            echo "🔹 Cleaning up ALL PM2 intelvox_frontend processes"
            # Delete ALL instances of intelvox_frontend (in case there are duplicates)
            pm2 delete all || echo "No PM2 processes to delete"
            # Kill PM2 daemon to ensure clean state
            pm2 kill
            sleep 3

            echo "🔹 Starting frontend process (correct directory)"
            cd /var/www/intelvox_frontend
            # Ensure we start fresh with only ONE instance
            pm2 start npm --name "intelvox_frontend" --instances 1 -- start
            pm2 save

            echo "⏳ Waiting for app to boot..."
            sleep 8

            echo "🔍 Checking what's running on port 3000..."
            netstat -tlnp | grep :3000 || echo "Nothing on port 3000"

            echo "🔍 Checking PM2 process status..."
            pm2 status

            echo "🔍 Checking health endpoint..."
            if ! pm2 show intelvox_frontend | grep -q "online"; then
              echo "❌ PM2 process is not running properly"
              pm2 logs intelvox_frontend --lines 20
              exit 1
            fi

            RETRIES=0
            MAX_RETRIES=10
            HEALTH_CHECK_SUCCESS=false

            while [ $RETRIES -lt $MAX_RETRIES ]; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
                echo "✅ Health check passed! Frontend is responding on localhost:3000."
                HEALTH_CHECK_SUCCESS=true
                break
              else
                echo "🔄 Health check attempt $((RETRIES + 1))/$MAX_RETRIES - HTTP $STATUS"
                RETRIES=$((RETRIES + 1))
                sleep 3
              fi
            done

            if [ "$HEALTH_CHECK_SUCCESS" = "false" ]; then
              echo "❌ Health check failed after $MAX_RETRIES attempts. Checking logs..."
              pm2 logs intelvox_frontend --lines 20
              echo "Restoring previous version..."
              pm2 delete intelvox_frontend || true
              rm -rf /var/www/intelvox_frontend
              if [ -d "/var/www/intelvox_frontend_old" ]; then
                mv /var/www/intelvox_frontend_old /var/www/intelvox_frontend
                cd /var/www/intelvox_frontend
                pm2 start npm --name "intelvox_frontend" -- start
                pm2 save
              fi
              echo "⚠️ Rolled back to previous stable release."
              exit 1
            else
              echo "🧽 Cleaning old backup folder"
              rm -rf /var/www/intelvox_frontend_old
            fi

            echo "🎉 Deployment successful and verified!"
